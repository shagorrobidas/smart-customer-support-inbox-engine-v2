version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: smart_inbox_db
    restart: always
    environment:
      POSTGRES_DB: smart_inbox
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: smart_inbox_redis
    restart: always
    ports:
      - "6379:6379"

  web:
    build: .
    container_name: smart_inbox_web
    restart: always
    # Run migrations, seed support agent, and start Daphne ASGI server on startup
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_agent &&
             daphne -b 0.0.0.0 -p 8000 core.asgi:application"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=smart_inbox
      - DB_USER=postgres
      - DB_PASSWORD=postgres_password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis

  celery:
    build: .
    container_name: smart_inbox_celery
    restart: always
    command: celery -A core worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DB_NAME=smart_inbox
      - DB_USER=postgres
      - DB_PASSWORD=postgres_password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis

volumes:
  pgdata:
